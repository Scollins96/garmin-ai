name: Sync Garmin Data

on:
  schedule:
    - cron: "0 10 * * *"  # 10:00 UTC daily — adjust for your timezone
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync Garmin data
        env:
          GARMIN_TOKEN_B64: ${{ secrets.GARMIN_TOKEN_B64 }}
          GARMIN_INGEST_URL: ${{ secrets.GARMIN_INGEST_URL }}
          GARMIN_INGEST_SECRET: ${{ secrets.SESSION_LOG_SECRET }}
        run: python sync_garmin.py --days 3 --sink files --out ./garmin

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add garmin/
          git diff --cached --quiet || git commit -m "Update Garmin data $(date -u +%Y-%m-%d)"
          git push
